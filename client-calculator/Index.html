<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&family=IBM+Plex+Sans+Hebrew:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --ink: #323338;
      --muted: #676879;
      --line: #d9d4fb;
      --line-soft: #ecebf5;
      --brand: #6161ff;          /* סגול המותג של meshelectric.com */
      --brand-soft: #f3f2ff;
      --accent: #1a7dc4;         /* כחול הלוגו – לאלמנטים של שותף/פרטי */
      --accent-soft: #e8f2fb;
      --expense-soft: #fff1e3;   /* כתום פסטל – שורות הוצאה */
      --expense-ink: #c26a1b;
      --shadow: 0 1px 3px rgba(40,40,90,.05), 0 10px 30px rgba(40,40,90,.06);
      --font-body: "Assistant", "Segoe UI", Arial, sans-serif;
      --font-head: "IBM Plex Sans Hebrew", "Assistant", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: var(--font-body);
      line-height: 1.5; padding: 20px 14px 60px;
    }
    .wrap { max-width: 760px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 22px; }
    header .logo { width: 130px; height: auto; margin: 0 auto 8px; display: block; border-radius: 18px; }
    header h1 { margin: 0 0 6px; font-size: 26px; font-family: var(--font-head); font-weight: 700; }
    .disclaimer {
      display: inline-block; background: var(--accent-soft); color: var(--accent);
      font-size: 13px; font-weight: 600; padding: 5px 14px; border-radius: 999px;
    }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 16px;
      box-shadow: var(--shadow); padding: 20px; margin-bottom: 18px;
    }
    .card h2 {
      margin: 0 0 16px; font-size: 18px; display: flex; align-items: center; gap: 8px;
      font-family: var(--font-head); font-weight: 600;
    }
    .card h2 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand); }
    .card.important { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft), var(--shadow); }
    .card.important h2 .dot { background: var(--accent); }

    #inputs { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); column-gap: 18px; align-items: start; }
    @media (max-width: 520px) { #inputs { grid-template-columns: 1fr; } }
    #inputs .spinner { grid-column: 1 / -1; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .field .hint { display: block; font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 4px; white-space: pre-line; }
    .input-row { display: flex; align-items: stretch; }
    .input-row input {
      flex: 1; font-size: 16px; padding: 11px 12px; border: 1px solid var(--line);
      border-radius: 10px; background: #fff; color: var(--ink); text-align: start;
    }
    .input-row input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
    .input-row .unit {
      display: flex; align-items: center; padding: 0 12px; color: var(--muted);
      font-size: 14px; font-weight: 600; background: var(--bg);
      border: 1px solid var(--line); border-inline-start: none;
      border-radius: 0 10px 10px 0; min-width: 46px; justify-content: center;
    }
    .input-row input { border-radius: 10px 0 0 10px; }

    button.primary {
      width: 100%; font-size: 17px; font-weight: 700; color: #fff; background: var(--brand);
      border: none; border-radius: 12px; padding: 15px; cursor: pointer; transition: filter .15s;
    }
    button.primary:hover { filter: brightness(1.06); }
    button.primary:disabled { opacity: .6; cursor: default; }

    .rows { display: flex; flex-direction: column; gap: 2px; }
    .line {
      display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
      padding: 10px 6px; border-bottom: 1px solid var(--line);
    }
    .line:last-child { border-bottom: none; }
    .line .k { color: var(--muted); font-size: 14px; }
    .line .v { font-weight: 700; font-size: 16px; white-space: nowrap; }
    .card.important .line .v { color: var(--brand); }
    .line.expense { background: var(--expense-soft); border-radius: 8px; padding-inline: 10px; border-bottom-color: transparent; }
    .line.expense .v { color: var(--expense-ink); }
    .line.expense .k::after { content: " · הוצאה"; font-size: 11px; color: var(--expense-ink); opacity: .8; }

    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
    .metric {
      background: var(--brand-soft); border-radius: 12px; padding: 14px; text-align: center;
    }
    .metric.priv { background: var(--accent-soft); }
    .metric .mv { font-size: 24px; font-weight: 800; color: var(--brand); }
    .metric.priv .mv { color: var(--accent); }
    .metric .ml { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* שפיצר */
    .toggle { display: inline-flex; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 3px; margin-bottom: 14px; }
    .toggle button {
      border: none; background: transparent; padding: 8px 16px; font-size: 14px; font-weight: 600;
      color: var(--muted); border-radius: 8px; cursor: pointer;
    }
    .toggle button.on { background: #fff; color: var(--brand); box-shadow: var(--shadow); }
    .table-scroll { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; white-space: nowrap; }
    th, td { padding: 9px 12px; text-align: start; border-bottom: 1px solid var(--line); }
    thead th { background: var(--bg); font-weight: 700; position: sticky; top: 0; }
    tbody tr:nth-child(even) { background: #fafbfc; }

    /* אקורדיון */
    .accordion-head {
      width: 100%; background: none; border: none; cursor: pointer; padding: 0; margin: 0;
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--font-head); font-weight: 600; font-size: 18px; color: var(--ink);
    }
    .accordion-head .title { display: flex; align-items: center; gap: 8px; }
    .accordion-head .chev { color: var(--muted); font-size: 14px; transition: transform .2s; }
    #spitzerBody { margin-top: 16px; }

    .muted-note { color: var(--muted); font-size: 13px; text-align: center; margin-top: 10px; }
    .spinner {
      display: none; width: 22px; height: 22px; border: 3px solid var(--brand-soft);
      border-top-color: var(--brand); border-radius: 50%; margin: 0 auto;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { display: none; background: #fdecec; color: #a12525; border-radius: 10px; padding: 12px; font-size: 14px; margin-bottom: 14px; }
    .hidden { display: none !important; }
  </style>
</head>

    <h1>מחשבון רווחיות</h1>
    <span class="disclaimer">⚠ כל המחירים והנתונים משוערים בלבד</span>
  </header>

  <div class="error" id="error"></div>

  <!-- טופס הקלט -->
  <div class="card">
    <h2><span class="dot"></span> פרמטרים</h2>
    <div id="inputs"><div class="spinner" style="display:block"></div></div>
    <button class="primary" id="calcBtn" onclick="runCalc()" disabled>חשב רווחיות</button>
  </div>

  <!-- תוצאות -->
  <div id="results" class="hidden">

    <!-- שדות (שטח פנלים, גודל מתקן אגירה) – לכולם -->
    <div class="card hidden" id="fieldsCard">
      <h2><span class="dot"></span> שדות</h2>
      <div class="rows" id="fields"></div>
    </div>

    <!-- פיננסי למשקיע (הכי חשוב) – לכולם -->
    <div class="card important hidden" id="investorCard">
      <h2><span class="dot"></span> פיננסי למשקיע</h2>
      <div class="rows" id="investor"></div>
    </div>

    <!-- תשואה (Private Leveraged IRR (CoC)) – רק לשותף -->
    <div class="card hidden" id="irrCard">
      <h2><span class="dot"></span> תשואה</h2>
      <div class="metrics" id="metrics"></div>
    </div>

    <!-- פיננסי לפרויקט – לכולם -->
    <div class="card hidden" id="projectCard">
      <h2><span class="dot"></span> פיננסי לפרויקט</h2>
      <div class="rows" id="project"></div>
    </div>

    <!-- שפיצר – רק לשותף. אקורדיון: נפתח בלחיצה. פרטי כברירת מחדל, כפתור מעבר לפרויקטלי -->
    <div class="card hidden" id="spitzerCard">
      <button class="accordion-head" id="spitzerHead" onclick="toggleSpitzerAcc()" aria-expanded="false">
        <span class="title"><span class="dot"></span> שפיצר – פירוט שנתי</span>
        <span class="chev" id="spitzerChev">▼</span>
      </button>
      <div id="spitzerBody" class="hidden">
        <div class="toggle" id="spitzerToggle">
          <button id="tabPrivate" class="on" onclick="showSpitzer('private')">שפיצר פרטי</button>
          <button id="tabProject" onclick="showSpitzer('project')">שפיצר פרויקטלי</button>
        </div>
        <div class="table-scroll"><table id="spitzerTable"></table></div>
      </div>
    </div>
  </div>
</div>

<script>
  var STATE = { spitzer: null, view: 'private' };

  // בניית הטופס בטעינה
  google.script.run
    .withSuccessHandler(buildForm)
    .withFailureHandler(showError)
    .getInputs();

  function buildForm(data) {
    var host = document.getElementById('inputs');
    host.innerHTML = '';
    data.inputs.forEach(function (f) {
      var wrap = document.createElement('div');
      wrap.className = 'field';
      var hint = (f.row === 9 && data.hint9) ? '<span class="hint">' + esc(data.hint9) + '</span>' : '';
      wrap.innerHTML =
        '<label>' + esc(f.label) + hint + '</label>' +
        '<div class="input-row">' +
          '<input type="number" step="any" id="in_' + f.row + '" value="' + f.value + '">' +
          (f.unit ? '<span class="unit">' + esc(f.unit) + '</span>' : '') +
        '</div>';
      host.appendChild(wrap);
    });
    document.getElementById('calcBtn').disabled = false;
  }

  function runCalc() {
    var btn = document.getElementById('calcBtn');
    btn.disabled = true; btn.textContent = 'מחשב…';
    hide('error');

    var map = {};
    document.querySelectorAll('input[id^="in_"]').forEach(function (el) {
      map[el.id.replace('in_', '')] = el.value;
    });

    google.script.run
      .withSuccessHandler(function (res) {
        renderResults(res);
        btn.disabled = false; btn.textContent = 'חשב מחדש';
      })
      .withFailureHandler(function (err) {
        showError(err);
        btn.disabled = false; btn.textContent = 'חשב רווחיות';
      })
      .calculate(map);
  }

  function renderResults(res) {
    // מוצג לכולם: שדות, פיננסי למשקיע (עם/בלי IRR), פיננסי לפרויקט
    fillLines('fields', res.fields);
    fillLines('investor', res.investor, true);   // הוצאות בכתום פסטל
    fillLines('project', res.project);
    ['fieldsCard', 'investorCard', 'projectCard'].forEach(show);

    // Private Leveraged IRR (CoC) – רק לשותף, ורק אם זה ערך תקין (לא #NUM! וכו')
    if (res.isPartner && res.irr && !isJunk(res.irr)) {
      renderIRR(res.irr);
      show('irrCard');
    } else {
      hide('irrCard');
    }

    // שפיצר – מוצג לכולם (אקורדיון סגור כברירת מחדל).
    // פרטי + toggle רק לשותף; לקוח רגיל רואה פרויקטלי בלבד.
    if (res.spitzer) {
      STATE.spitzer = res.spitzer;
      var hasPrivate = !!res.spitzer.private;
      document.getElementById('spitzerToggle').classList.toggle('hidden', !hasPrivate);
      showSpitzer(hasPrivate ? 'private' : 'project');         // מכין את הטבלה מראש
      document.getElementById('spitzerBody').classList.add('hidden');   // סגור כברירת מחדל
      document.getElementById('spitzerChev').textContent = '▼';
      document.getElementById('spitzerHead').setAttribute('aria-expanded', 'false');
      show('spitzerCard');
    } else {
      hide('spitzerCard');
    }

    show('results');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
  }

  var EXPENSE_KEYS = ['תחזוקה כוללת', 'החזר הלוואה חודשי', 'הלוואה יחסית'];
  function isExpense(label) {
    label = String(label || '');
    return EXPENSE_KEYS.some(function (k) { return label.indexOf(k) > -1; });
  }

  function fillLines(id, arr, markExpenses) {
    var host = document.getElementById(id);
    host.innerHTML = '';
    (arr || []).forEach(function (r) {
      if (!r) return;
      if (isJunk(r.value)) return;                 // מדלגים על שורות עם ערך-זבל
      var exp = markExpenses && isExpense(r.label);
      var line = document.createElement('div');
      line.className = 'line' + (exp ? ' expense' : '');
      line.innerHTML = '<span class="k">' + esc(r.label) + '</span><span class="v">' + esc(r.value) + '</span>';
      host.appendChild(line);
    });
  }

  function renderIRR(val) {
    document.getElementById('metrics').innerHTML =
      '<div class="metric priv"><div class="mv">' + esc(val) + '</div>' +
      '<div class="ml">Private Leveraged IRR (CoC)</div></div>';
  }

  // ---- שפיצר ----
  function toggleSpitzerAcc() {
    var body = document.getElementById('spitzerBody');
    var nowHidden = body.classList.toggle('hidden');
    document.getElementById('spitzerChev').textContent = nowHidden ? '▼' : '▲';
    document.getElementById('spitzerHead').setAttribute('aria-expanded', String(!nowHidden));
  }

  function showSpitzer(view) {
    STATE.view = view;
    document.getElementById('tabProject').classList.toggle('on', view === 'project');
    document.getElementById('tabPrivate').classList.toggle('on', view === 'private');
    renderSpitzer();
  }

  function renderSpitzer() {
    var d = STATE.spitzer[STATE.view];
    var t = document.getElementById('spitzerTable');
    var html = '<thead><tr>';
    d.headers.forEach(function (h) { html += '<th>' + esc(h) + '</th>'; });
    html += '</tr></thead><tbody>';
    d.rows.forEach(function (row) {
      html += '<tr>';
      row.forEach(function (c) { html += '<td>' + esc(cleanCell(c)) + '</td>'; });
      html += '</tr>';
    });
    html += '</tbody>';
    t.innerHTML = html;
  }

  // ---- ניקוי ערכי-זבל (FALSE / TRUE / #NUM! / #DIV/0! / null / ריק ...) ----
  function isJunk(v) {
    var s = String(v == null ? '' : v).trim();
    return s === '' || s === 'FALSE' || s === 'TRUE' || s.charAt(0) === '#' ||
           s === 'NaN' || s.toLowerCase() === 'null' || s.toLowerCase() === 'undefined';
  }
  function cleanCell(v) {
    var s = String(v == null ? '' : v).trim();
    if (s === '') return '';                              // תא ריק נשאר ריק (למשל שנה 0)
    return isJunk(s) ? '—' : s;                           // FALSE/שגיאה → מקף
  }

  // ---- עזר ----
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }
  function showError(err) {
    var e = document.getElementById('error');
    e.textContent = 'אירעה שגיאה: ' + (err && err.message ? err.message : err);
    e.style.display = 'block';
  }
</script>
</body>
</html>
